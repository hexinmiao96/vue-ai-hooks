name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm security:audit

      - name: Format
        run: pnpm format:check

      - name: Secrets
        run: pnpm secrets:check

      - name: Source hygiene
        run: pnpm source:hygiene

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck:all

      - name: Test hygiene
        run: pnpm test:hygiene

      - name: Test
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Dist
        run: pnpm dist:check

      - name: Size
        run: pnpm size:check

      - name: Package
        run: pnpm pack:check

      - name: Install
        run: pnpm install:check

      - name: Changelog
        run: pnpm changelog:check

      - name: Metadata
        run: pnpm metadata:check

      - name: Community health
        run: pnpm community:check

      - name: Workflows
        run: pnpm workflows:check

      - name: API docs
        run: pnpm api:check

      - name: Links
        run: pnpm links:check

      - name: Examples
        run: pnpm examples:build

      - name: Docs
        run: pnpm docs:build
