name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Use current npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag
        if: github.ref_type == 'tag'
        run: |
          version="$(node -p "require('./package.json').version")"
          test "v${version}" = "$GITHUB_REF_NAME"

      - name: Release cadence
        run: pnpm release:cadence
        env:
          RELEASE_CADENCE_REQUIRE_UNPUBLISHED: 'true'

      - name: Security audit
        run: pnpm security:audit

      - name: Format
        run: pnpm format:check

      - name: Secrets
        run: pnpm secrets:check

      - name: Source hygiene
        run: pnpm source:hygiene

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck:all

      - name: Test hygiene
        run: pnpm test:hygiene

      - name: Test
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Dist
        run: pnpm dist:check

      - name: Size
        run: pnpm size:check

      - name: Package
        run: pnpm pack:check

      - name: Install
        run: pnpm install:check

      - name: Changelog
        run: pnpm changelog:check

      - name: Metadata
        run: pnpm metadata:check

      - name: Community health
        run: pnpm community:check

      - name: Workflows
        run: pnpm workflows:check

      - name: API docs
        run: pnpm api:check

      - name: Docs UX
        run: pnpm docs:ux:check

      - name: Proxy example
        run: pnpm proxy:check

      - name: Image demo
        run: pnpm image:check

      - name: Demo UX visual check
        run: pnpm demo-ux:check

      - name: Completion and object demo
        run: pnpm completion-object:check

      - name: React video demo
        run: pnpm react-video:check

      - name: Threaded chat
        run: pnpm threaded-chat:check

      - name: UI message stream
        run: pnpm ui-message-stream:check

      - name: Agent run
        run: pnpm agent-run:check

      - name: Tool approval
        run: pnpm tool-approval:check

      - name: Agent bridge
        run: pnpm agent-bridge:check

      - name: Agent route templates
        run: pnpm agent-route-templates:check

      - name: Competitive benchmark
        run: pnpm competitive-benchmark:check

      - name: Links
        run: pnpm links:check

      - name: Examples
        run: pnpm examples:build

      - name: Docs
        run: pnpm docs:build

      - name: Publish
        run: npm publish --access public --provenance
